name: Scrape semanal

on:
  schedule:
    - cron: '0 9 * * 1'   # lunes 06:00 ART
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scraper/requirements.txt

      - name: Scrape
        working-directory: scraper
        run: |
          python scrape_cms.py
          python scrape_capemisa.py
          python scrape_uis.py
          python enriquecer.py

      - name: Matching + build
        working-directory: scraper
        run: |
          python matching.py
          python build_db.py

      - name: Commit si hay cambios
        run: |
          git config user.name "scraper-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Sin cambios."
            exit 0
          fi
          RESUMEN=$(python -c "
          import json, pathlib
          p = pathlib.Path('data/resumen_run.json')
          if p.exists():
              d = json.loads(p.read_text())
              c = d.get('cambios', {})
              partes = []
              if c.get('alta'): partes.append(f\"+{c['alta']} altas\")
              if c.get('baja'): partes.append(f\"-{c['baja']} bajas\")
              if c.get('modificacion'): partes.append(f\"{c['modificacion']} modificaciones\")
              if c.get('nuevo_rubro'): partes.append(f\"{c['nuevo_rubro']} nuevos rubros\")
              print(', '.join(partes) or 'datos actualizados')
          else:
              print('datos actualizados')
          ")
          FECHA=$(date -u +%Y-%m-%d)
          git commit -m "feat(data): ${RESUMEN} — run ${FECHA}"
          git push
